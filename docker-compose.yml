services:
  ros_dev:
    build:
      context: .
      args:
        - USERNAME=davi
    image: jazzy_usp_custom
    container_name: jazzy_robos
    network_mode: host
    ipc: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # Force NVIDIA dGPU for OpenGL — hybrid-graphics laptop
      - __NV_PRIME_RENDER_OFFLOAD=1
      - __GLX_VENDOR_LIBRARY_NAME=nvidia
      - XDG_RUNTIME_DIR=/tmp/runtime-davi

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - .:/home/davi/robos_moveis:rw  # Maps current folder to container
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]